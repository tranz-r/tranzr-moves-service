# On changes under documents/ (not images/ alone): render all .puml, overwrite PNGs, chore commit.
name: Render documentation diagrams

on:
  push:
    paths:
      - "documents/**"
    paths-ignore:
      - "documents/**/images/**"
  pull_request:
    paths:
      - "documents/**"
    paths-ignore:
      - "documents/**/images/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-plantuml:
    name: Render PlantUML diagrams
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Start PlantUML server
        run: |
          docker rm -f plantuml 2>/dev/null || true
          docker run -d --name plantuml -p 8080:8080 plantuml/plantuml-server:jetty
          printf '@startuml\na -> b\n@enduml\n' > /tmp/plantuml-probe.puml
          for i in $(seq 1 90); do
            sleep 2
            if curl -sf http://localhost:8080/png -o /dev/null -X POST \
              -H "Content-Type: text/plain" \
              --data-binary @/tmp/plantuml-probe.puml; then
              echo "PlantUML server is ready."
              exit 0
            fi
          done
          echo "PlantUML server failed to start."
          docker logs plantuml
          exit 1

      - name: Render diagrams
        env:
          PLANTUML_SERVER_URL: http://localhost:8080
          PLANTUML_CONTAINER: plantuml
        run: |
          chmod +x scripts/render-plantuml.sh
          ./scripts/render-plantuml.sh

      - name: Commit and push diagram PNGs
        if: |
          github.event_name == 'workflow_dispatch' ||
          github.event_name == 'push' ||
          (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          find documents -type f -path '*/images/*.png' -print0 | xargs -0 git add -f
          git commit -m "chore: update rendered PlantUML diagram PNGs" --allow-empty
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin "HEAD:${{ github.head_ref }}"
          else
            git push
          fi

      - name: Stop PlantUML server
        if: always()
        run: docker rm -f plantuml || true
