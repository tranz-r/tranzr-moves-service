# Render .puml → PNG under documents/**/images/ and commit. PNG-only pushes are paths-ignored
# by Integration Test / commitlint so they do not trigger release (see integration-test.yaml).
name: Render documentation diagrams

on:
  push:
    branches:
      - "**"
    paths:
      - "documents/**/*.puml"
      - "documents/**/*.md"
      - "scripts/render-plantuml.sh"
  pull_request:
    paths:
      - "documents/**/*.puml"
      - "documents/**/*.md"
      - "scripts/render-plantuml.sh"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render-plantuml:
    name: Render and commit PlantUML diagram PNGs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.pull_request.head.ref || github.ref_name }}

      - name: Start PlantUML server
        run: |
          docker rm -f plantuml 2>/dev/null || true
          docker run -d --name plantuml -p 8080:8080 plantuml/plantuml-server:jetty
          printf '@startuml\na -> b\n@enduml\n' > /tmp/plantuml-probe.puml
          for i in $(seq 1 90); do
            sleep 2
            if curl -sf http://localhost:8080/png -o /dev/null -X POST \
              -H "Content-Type: text/plain" \
              --data-binary @/tmp/plantuml-probe.puml; then
              echo "PlantUML server is ready."
              exit 0
            fi
          done
          echo "PlantUML server failed to start."
          docker logs plantuml
          exit 1

      - name: Render diagrams
        env:
          PLANTUML_SERVER_URL: http://localhost:8080
          PLANTUML_CONTAINER: plantuml
        run: |
          chmod +x scripts/render-plantuml.sh
          ./scripts/render-plantuml.sh

      - name: Commit and push diagram PNGs
        if: |
          github.event_name == 'workflow_dispatch' ||
          (github.event_name == 'push' && github.ref_type == 'branch') ||
          (github.event_name == 'pull_request' &&
            github.event.pull_request.head.repo.full_name == github.repository)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! find documents -type f -path '*/images/*.png' -print -quit | grep -q .; then
            echo "No PNG files under documents/**/images/."
            exit 0
          fi
          find documents -type f -path '*/images/*.png' -print0 | xargs -0 git add -f
          if git diff --staged --quiet; then
            echo "Diagram PNGs already up to date."
            exit 0
          fi
          git commit -m "chore: update rendered PlantUML diagram PNGs [skip ci]"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git push origin "HEAD:${{ github.head_ref }}"
          else
            git push origin "HEAD:${{ github.ref_name }}"
          fi

      - name: Stop PlantUML server
        if: always()
        run: docker rm -f plantuml || true
