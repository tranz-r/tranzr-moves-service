# Local infrastructure for TranzrMoves API, Worker, and Notifications.
# Connection strings match appsettings defaults (same Postgres database `tranzr`).
#
# Usage:
#   ./scripts/compose-up.sh                    # recommended — rebuilds migrator when needed, then starts stack
#   docker compose up -d                       # infra only; notifications migrations may be stale (see script)
#   dotnet ef database update --project Src/TranzrMoves.Infrastructure --startup-project Src/TranzrMoves.Api
#   ./scripts/compose-up.sh notifications worker

services:
  postgres:
    image: postgres:17-alpine
    container_name: tranzr-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: tranzr
      POSTGRES_PASSWORD: tranzr
      POSTGRES_DB: tranzr
    volumes:
      - tranzr-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tranzr -d tranzr"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: tranzr-redis
    ports:
      - "6379:6379"
    # Required for PayLaterChargeExpiryListener (Redis key expiry events).
    command: redis-server --notify-keyspace-events Ex
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: tranzr-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  smtp4dev:
    image: rnwood/smtp4dev:latest
    container_name: tranzr-smtp4dev
    ports:
      - "8025:80"
      - "2525:25"

  notifications-db-migrator:
    build:
      context: .
      dockerfile: Src/NotificationsDbMigrator.Dockerfile
    container_name: tranzr-notifications-db-migrator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_CONNECTION_STRING: Server=postgres;Port=5432;Database=tranzr;User Id=tranzr;Password=tranzr;
    restart: "no"

  notifications:
    build:
      context: .
      dockerfile: Src/TranzrMoves.Notifications/Dockerfile
    container_name: tranzr-notifications
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      notifications-db-migrator:
        condition: service_completed_successfully
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__TranzrMovesDatabaseConnection: Server=postgres;Port=5432;Database=tranzr;User Id=tranzr;Password=tranzr;
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672
      Notifications__EmailProvider: ${NOTIFICATIONS_EMAIL_PROVIDER:-Smtp}
      Notifications__Smtp__Host: smtp4dev
      Notifications__Smtp__Port: 25
      Notifications__Smtp__UseSsl: false
      COMMUNICATION_SERVICES_CONNECTION_STRING: ${COMMUNICATION_SERVICES_CONNECTION_STRING:-endpoint=https://test.communication.azure.com/;accesskey=dGVzdA==}
    ports:
      - "8081:8080"

  worker:
    build:
      context: .
      dockerfile: Src/TranzrMoves.Worker/Dockerfile
    container_name: tranzr-worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DOTNET_ENVIRONMENT: Development
      ASPNETCORE_ENVIRONMENT: Development
      Worker__Role: All
      ConnectionStrings__TranzrMovesDatabaseConnection: Server=postgres;Port=5432;Database=tranzr;User Id=tranzr;Password=tranzr;
      ConnectionStrings__rabbitmq: amqp://guest:guest@rabbitmq:5672
      ConnectionStrings__redis: redis:6379
      CHECKOUT_SESSION_SUCCESS_URL: http://localhost:3000/checkout/success
      CHECKOUT_SESSION_CANCEL_URL: http://localhost:3000/checkout/cancel
      QuoteReminders__FrontendBaseUrl: http://localhost:3000
      QuoteReminders__NotificationsBaseUrl: http://localhost:8081
      STRIPE_API_KEY: ${STRIPE_API_KEY:-}

volumes:
  tranzr-postgres-data:
